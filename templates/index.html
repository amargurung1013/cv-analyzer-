<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CV</title>

    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>

<body>

<div class="container">

    <div class="hero">

        <h1>CV</h1>

        <p>
            Resume Intelligence System
        </p>

    </div>

    <form
        action="/result"
        method="POST"
        enctype="multipart/form-data"
        class="analyze-form"
    >

        <label class="upload-label" for="resume-upload">

            <span class="upload-icon">↑</span>

            <span class="upload-title">
                Drop your resume
            </span>

            <span class="upload-hint">
                PDF • OCR Supported
            </span>

            <input
                id="resume-upload"
                type="file"
                name="resume"
                accept="application/pdf,.pdf"
                required
            >

        </label>

        <button type="submit">
            Analyze Resume
        </button>

    </form>

</div>

</body>
</html>
